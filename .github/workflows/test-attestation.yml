name: Test Remote Attestation

on:
  workflow_dispatch:

jobs:
  attest-test:
    runs-on: [self-hosted, bountynet, tdx]
    steps:
      - name: Repair runner workspace ownership
        run: |
          set -euo pipefail
          WORK_ROOT="${RUNNER_WORKSPACE:-$(dirname "${GITHUB_WORKSPACE}")}"
          echo "Repairing ownership under ${WORK_ROOT}"
          sudo mkdir -p "${GITHUB_WORKSPACE}"
          sudo chown -R "$(id -u):$(id -g)" "${WORK_ROOT}" "${GITHUB_WORKSPACE}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare verifier toolchain
        run: |
          set -euo pipefail
          if ! command -v cc >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y build-essential cmake pkg-config
          fi
          if ! command -v cargo >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi

      - name: Check TEE environment
        run: |
          echo "=== TEE Device Check ==="
          ls -la /dev/tdx* /dev/sev* /dev/nsm 2>/dev/null || echo "No TEE devices visible (expected in container)"
          echo ""
          echo "=== Environment ==="
          echo "BOUNTYNET_VALUE_X=${BOUNTYNET_VALUE_X:-not set}"
          echo "BOUNTYNET_ATTEST_PORT=${BOUNTYNET_ATTEST_PORT:-not set}"

      - name: Query attestation endpoint
        run: |
          set -euo pipefail
          ATTEST_PORT="${BOUNTYNET_ATTEST_PORT:-9384}"
          echo "=== Health Check ==="
          if ! curl -sf "http://localhost:${ATTEST_PORT}/health"; then
            echo "No pre-existing runner attestation endpoint on port ${ATTEST_PORT}."
            echo "Continuing to the self-contained hosted-site TEE smoke."
            exit 0
          fi
          echo " OK"

          echo ""
          echo "=== Value X ==="
          curl -sf "http://localhost:${ATTEST_PORT}/attest/value-x" | jq .

          echo ""
          echo "=== Cached Attestation (compact) ==="
          curl -sf "http://localhost:${ATTEST_PORT}/attest" | jq .

          echo ""
          echo "=== Fresh Full Attestation ==="
          NONCE="000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f"
          FULL_QUOTE=$(curl -sf -X POST "http://localhost:${ATTEST_PORT}/attest/full" \
            -H 'content-type: application/json' \
            --data "{\"nonce\":\"${NONCE}\"}")
          test "$(echo "${FULL_QUOTE}" | jq -r .nonce)" = "${NONCE}"
          echo "${FULL_QUOTE}" | jq '{
            version: .version,
            platform: .platform,
            value_x: .value_x,
            platform_quote_hash: .platform_quote_hash,
            timestamp: .timestamp,
            pubkey: .pubkey,
            quote_size: (.platform_quote | length / 2)
          }'

      - name: Verify attestation identity
        run: |
          set -euo pipefail
          ATTEST_PORT="${BOUNTYNET_ATTEST_PORT:-9384}"
          if ! curl -sf "http://localhost:${ATTEST_PORT}/health" >/dev/null; then
            echo "No pre-existing runner attestation endpoint; skipping sidecar identity check."
            exit 0
          fi
          cargo run --bin verify-runner -- "http://localhost:${ATTEST_PORT}" --expected-platform Tdx

      - name: Hosted site TEE smoke
        run: |
          set -euo pipefail
          v2/packaging/smoke-local-site.sh --mode tee --timeout 900
