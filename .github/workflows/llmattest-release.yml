name: Package llmattest

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version label to include in archive names
        required: false
        default: dev
  push:
    branches: [main]
    paths:
      - 'Cargo.*'
      - 'src/**'
      - 'tests/**'
      - 'testdata/**'
      - 'packaging/**'
      - 'capture/**'
      - 'LLM_ATTESTED.md'
      - '.github/workflows/llmattest-release.yml'

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  package:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Test llmattest unit surface
        run: cargo test --manifest-path Cargo.toml llm_attested --bin llmattest --lib

      - name: Package Unix archive
        if: runner.os != 'Windows'
        env:
          LLMATTEST_VERSION: ${{ github.event.inputs.version || github.sha }}
        run: |
          set -euo pipefail
          chmod +x packaging/package-llmattest.sh
          packaging/package-llmattest.sh --target "${{ matrix.target }}" --version "$LLMATTEST_VERSION"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          LLMATTEST_VERSION: ${{ github.event.inputs.version || github.sha }}
        run: |
          cargo build --manifest-path Cargo.toml --release --bin llmattest --target "${{ matrix.target }}"
          $pkg = "llmattest-$env:LLMATTEST_VERSION-${{ matrix.target }}"
          $work = Join-Path $env:RUNNER_TEMP $pkg
          New-Item -ItemType Directory -Path $work | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/llmattest.exe" "$work/llmattest.exe"
          Copy-Item "LLM_ATTESTED.md" "$work/LLM_ATTESTED.md"
          @{
            name = "llmattest"
            version = $env:LLMATTEST_VERSION
            target = "${{ matrix.target }}"
            binary = "llmattest.exe"
            entrypoint = "llmattest start --team-payload team.json -- <agent command>"
          } | ConvertTo-Json | Set-Content "$work/manifest.json"
          New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          Compress-Archive -Path $work -DestinationPath "dist/$pkg.zip" -Force
          Get-FileHash "dist/$pkg.zip" -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  $pkg.zip" } | Set-Content "dist/$pkg.zip.sha256"

      - name: Generate GitHub artifact provenance
        uses: actions/attest@v4
        with:
          subject-path: dist/llmattest-*

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: llmattest-${{ matrix.target }}
          path: |
            dist/llmattest-*
          if-no-files-found: error

  tdx-attested-linux:
    name: TDX attested Linux binary
    runs-on: [self-hosted, tdx, cvm]
    timeout-minutes: 45

    steps:
      - name: Repair runner workspace ownership
        run: |
          set -euo pipefail
          WORK_ROOT="${RUNNER_WORKSPACE:-$(dirname "${GITHUB_WORKSPACE}")}"
          sudo mkdir -p "${GITHUB_WORKSPACE}"
          sudo chown -R "$(id -u):$(id -g)" "${WORK_ROOT}" "${GITHUB_WORKSPACE}"

      - uses: actions/checkout@v4

      - name: Prepare Rust toolchain and Cvm builder
        run: |
          set -euo pipefail
          if ! command -v cc >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y build-essential cmake pkg-config curl
          elif ! command -v curl >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y curl
          fi
          if ! command -v cargo >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
          CARGO_BIN="$(command -v cargo || true)"
          if [ -z "$CARGO_BIN" ] && [ -x "$HOME/.cargo/bin/cargo" ]; then
            CARGO_BIN="$HOME/.cargo/bin/cargo"
          fi
          CVM_BIN="$(command -v cvm || true)"
          if [ -z "$CARGO_BIN" ]; then
            echo "cargo was not found"
            exit 1
          fi
          if [ -z "$CVM_BIN" ]; then
            echo "self-hosted TDX runner must provide cvm or cvm"
            exit 1
          fi
          "$CARGO_BIN" --version
          "$CVM_BIN" 2>&1 | head -4 || true
          echo "CARGO_BIN=$CARGO_BIN" >> "$GITHUB_ENV"
          echo "CVM_BIN=$CVM_BIN" >> "$GITHUB_ENV"
          echo "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" >> "$GITHUB_ENV"
          echo "CARGO_HOME=${CARGO_HOME:-$HOME/.cargo}" >> "$GITHUB_ENV"

      - name: Build llmattest inside TDX and emit Cvm attestation
        env:
          LLMATTEST_VERSION: ${{ github.event.inputs.version || github.sha }}
        run: |
          set -euo pipefail
          WORK="$GITHUB_WORKSPACE/tdx-release"
          rm -rf "$WORK"
          mkdir -p "$WORK/attest-out" "$WORK/package"
          sudo env "PATH=$PATH" "RUSTUP_HOME=$RUSTUP_HOME" "CARGO_HOME=$CARGO_HOME" "$CVM_BIN" build . \
            --cmd "$CARGO_BIN build --release --bin llmattest" \
            --output "$WORK/attest-out"
          sudo chown -R "$(id -u):$(id -g)" "$WORK"

          install -m 0755 "$WORK/attest-out/artifact" "$WORK/package/llmattest"
          cp "$WORK/attest-out/attestation.cbor" "$WORK/package/llmattest.tdx.eat.cbor"
          cp "$WORK/attest-out/attestation.json" "$WORK/package/llmattest.tdx.attestation.json"
          cp LLM_ATTESTED.md "$WORK/package/LLM_ATTESTED.md"
          cat > "$WORK/package/manifest.json" <<EOF
          {
            "name": "llmattest",
            "version": "$LLMATTEST_VERSION",
            "target": "x86_64-unknown-linux-gnu",
            "binary": "llmattest",
            "hardware_attestation": "llmattest.tdx.eat.cbor",
            "attestation_summary": "llmattest.tdx.attestation.json",
            "entrypoint": "llmattest start --team-payload team.json -- <agent command>"
          }
          EOF

          PKG="llmattest-$LLMATTEST_VERSION-x86_64-unknown-linux-gnu-tdx-attested"
          tar -C "$WORK/package" -czf "$WORK/$PKG.tar.gz" .
          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$WORK" && sha256sum "$PKG.tar.gz" > "$PKG.tar.gz.sha256")
          else
            (cd "$WORK" && shasum -a 256 "$PKG.tar.gz" > "$PKG.tar.gz.sha256")
          fi
          echo "TDX_PACKAGE=$WORK/$PKG.tar.gz" >> "$GITHUB_ENV"
          echo "TDX_PACKAGE_SHA=$WORK/$PKG.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Generate GitHub provenance for TDX package
        uses: actions/attest@v4
        with:
          subject-path: |
            ${{ env.TDX_PACKAGE }}
            ${{ env.TDX_PACKAGE_SHA }}

      - name: Upload TDX attested package
        uses: actions/upload-artifact@v4
        with:
          name: llmattest-x86_64-unknown-linux-gnu-tdx-attested
          path: |
            ${{ env.TDX_PACKAGE }}
            ${{ env.TDX_PACKAGE_SHA }}
          if-no-files-found: error

      - name: Repair workspace ownership after sudo build
        if: always()
        run: |
          set -euo pipefail
          sudo chown -R "$(id -u):$(id -g)" "${GITHUB_WORKSPACE}"
